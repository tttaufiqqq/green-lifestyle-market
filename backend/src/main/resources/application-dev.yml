# Dev profile: enables Swagger, relaxed logging, auto-creates Spring Session tables.
# Activate with: -Dspring.profiles.active=dev

spring:
  session:
    jdbc:
      initialize-schema: always

  flyway:
    locations: classpath:db/migration,classpath:db/seed
    placeholders:
      # glm_app_dev's own Flashback Archive — distinct from prod's glm_fda so
      # they don't collide (FDA names are unique per PDB). See docs/01-oracle/glm-db-access.md.
      flashback-archive-name: glm_fda_dev

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger

logging:
  level:
    com.glm: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: DEBUG
