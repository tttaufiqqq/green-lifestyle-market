# Nginx config for GreenMarket (glm.tttaufiqqq.com)
# SPA static files + /api proxy to Spring Boot (8080) + /ws WebSocket proxy
# Served behind Cloudflare — TLS terminated at CF edge; internal HTTP here.

server {
    listen 80;
    server_name glm.tttaufiqqq.com;

    root /var/glm/frontend/dist;
    index index.html;

    # User-uploaded media served outside webroot (docs/environment.md: UPLOAD_DIR)
    location /media/ {
        alias /var/glm/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        # Only serve known image types
        location ~* \.(jpg|jpeg|png|webp)$ { }
        return 403;
    }

    # REST API — proxy to Spring Boot
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # STOMP WebSocket — proxy to Spring Boot
    location /ws/ {
        proxy_pass             http://127.0.0.1:8080;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
